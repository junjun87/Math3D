services:
  # ============ 数据库 ============
  postgres:
    image: postgres:16-alpine
    container_name: math3d-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-math3d}
      POSTGRES_USER: ${POSTGRES_USER:-math3d}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-math3d_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-math3d}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: math3d-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============ 后端服务 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: math3d-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - lessons_data:/app/lessons
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-math3d}:${POSTGRES_PASSWORD:-math3d_secret}@postgres:5432/${POSTGRES_DB:-math3d}
      - REDIS_URL=redis://redis:6379/0
      - OCR_SERVICE_URL=http://ocr:8001
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.anthropic.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: math3d-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - lessons_data:/app/lessons
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-math3d}:${POSTGRES_PASSWORD:-math3d_secret}@postgres:5432/${POSTGRES_DB:-math3d}
      - 'DATABASE_URL_SYNC=postgresql+psycopg2://${POSTGRES_USER:-math3d}:${POSTGRES_PASSWORD:-math3d_secret}@postgres:5432/${POSTGRES_DB:-math3d}'
      - REDIS_URL=redis://redis:6379/0
      - OCR_SERVICE_URL=http://ocr:8001
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.anthropic.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============ OCR 推理服务 ============
  ocr:
    build:
      context: ./ml_service
      dockerfile: Dockerfile.cpu
    container_name: math3d-ocr
    ports:
      - "8001:8001"
    volumes:
      - ./ml_service/app:/app
    environment:
      - OCR_LANG=${OCR_LANG:-ch}

  # ============ 前端开发服务器 ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: math3d-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://59.110.93.243:8000/api/v1

  # ============ Nginx 反向代理（生产环境） ============
  nginx:
    image: nginx:alpine
    container_name: math3d-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    profiles:
      - production

volumes:
  postgres_data:
  uploads_data:
  lessons_data:
